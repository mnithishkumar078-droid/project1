<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Now - Online Voting System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="votenow-page">
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-check-circle"></i> OnlineVoting
        </div>
        <ul class="nav-menu">
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
            <li><a href="votenow.html" class="active vote-now-btn"><i class="fas fa-vote-yea"></i> Vote Now</a></li>
        </ul>
        <div class="user-actions">
            <span id="fullNameDisplay" class="full-name-display"><i class="fas fa-user"></i> Voter</span>
            <button id="logoutBtn" class="logout-btn" type="button"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </nav>

    <main>
        <section class="voting-section">
            <h1>Choose Your Candidate</h1>
            <p class="voting-note">Candidates shown below are loaded from MongoDB and update instantly after admin changes.</p>
            <div id="candidateList" class="candidate-grid"></div>
        </section>
    </main>

    <script src="voting.js"></script>
</body>
</html>
