<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Candidate Management & Analytics</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">OnlineVoting Admin</div>
        <ul class="nav-menu">
            <li><a href="#" id="adminLogoutBtn">Admin Logout</a></li>
        </ul>
    </nav>

    <main>
        <section class="admin-section">
            <h1>Candidate Administration</h1>

            <section class="analytics-panel">
                <div class="analytics-header">
                    <h2>Election Analytics</h2>
                    <div class="analytics-actions">
                        <button id="refreshAnalyticsBtn" class="btn btn-primary">Refresh Analytics</button>
                        <button id="toggleElectionBtn" class="btn btn-secondary">Toggle Election</button>
                        <button id="resetVotesBtn" class="btn btn-secondary">Reset Votes</button>
                        <button id="exportCsvBtn" class="btn btn-primary">Export CSV</button>
                    </div>
                </div>
                <div class="stats-grid">
                    <article class="stat-card"><h3>Total Voters</h3><p id="totalVoters">0</p></article>
                    <article class="stat-card"><h3>Total Votes</h3><p id="totalVotes">0</p></article>
                    <article class="stat-card"><h3>Turnout</h3><p id="turnoutPercent">0%</p></article>
                    <article class="stat-card"><h3>Election Status</h3><p id="electionStatus">Open</p></article>
                </div>
                <div class="leading-candidate" id="leadingCandidate">Leading candidate will appear here.</div>
                <div id="analyticsTable" class="analytics-table-wrap"></div>
            </section>

            <form id="candidateForm" class="candidate-form">
                <input type="hidden" id="candidateId" />
                <div class="form-group">
                    <label for="candidateName">Candidate Name</label>
                    <input id="candidateName" required />
                </div>
                <div class="form-group">
                    <label for="candidateParty">Candidate Party</label>
                    <input id="candidateParty" required />
                </div>
                <div class="form-group">
                    <label for="candidateImage">Candidate Image (4x4 preferred)</label>
                    <input id="candidateImage" type="file" accept="image/*" />
                </div>
                <button type="submit" class="btn btn-primary">Save Candidate</button>
                <button type="button" id="resetBtn" class="btn btn-secondary">Reset</button>
            </form>

            <div id="adminStatus"></div>
            <div id="adminCandidateList" class="candidate-grid"></div>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
